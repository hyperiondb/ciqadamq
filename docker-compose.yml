services:
  node1:
    build: .
    image: ciqadamq
    command: ["cluster.toml"]
    environment:
      NODE_ID: "1"
      API_TOKEN: ${API_TOKEN:-change-me}
      RUST_LOG: ${RUST_LOG:-info}
      AUTH_CACHE_TTL_SECS: ${AUTH_CACHE_TTL_SECS:-300}
      MSG_FLUSH_SECS: "5" # default is 5 seconds, 0 - in memory
      MSG_MAX_BYTES: "268435456"
      RAFT_WORKER_THREADS: "6"
      ARGON2_M_COST: "9216"
      ARGON2_T_COST: "2"
      ARGON2_P_COST: "1"
      AUTH_HASH_CONCURRENCY: "4"
      AUTH_DISABLED: "0"
      AUTH_PEPPER: "dev-pepper-change-in-prod"
      REDB_CACHE_BYTES: "67108864"
    volumes:
      - ./docker/cluster.toml:/app/cluster.toml:ro
      - node1data:/app/data
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8090:8090"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8090"]
      interval: 2s
      timeout: 3s
      retries: 60
    restart: unless-stopped

